name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    env:
      RELEASE_VERSION: ''   # populated in "Extract version" step

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for changelog generation

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "RELEASE_VERSION=$version" >> $env:GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish self-contained Windows x64
        run: >
          dotnet publish src/GBM.Desktop/GBM.Desktop.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish/win-x64
          -p:PublishSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Download previous release for delta generation
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.VELOPACK_GITHUB_TOKEN }}
          --outputDir releases/
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId GloriousBatteryMonitor
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish/win-x64
          --mainExe GBM.Desktop.exe
          --packTitle "Glorious Battery Monitor"
          --outputDir releases/
          --icon src/GBM.Desktop/Assets/app-icon.ico

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.VELOPACK_GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.TAG }}"
          $notes = ""
          if (Test-Path RELEASE_NOTES.md) {
            $notes = Get-Content RELEASE_NOTES.md -Raw
          }
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "Release $tag"
          }

          # Create the release with gh CLI
          $assets = Get-ChildItem releases/ | ForEach-Object { $_.FullName }
          $notesFile = "RELEASE_NOTES.md"
          $notes | Out-File -FilePath $notesFile -Encoding utf8

          # Check if this is a pre-release (has beta, rc, alpha, etc.)
          $isPrerelease = $tag -match '-\w+\d+$'

          $releaseArgs = @(
            $tag
            $assets
            "--title", "Glorious Battery Monitor $tag"
            "--notes-file", $notesFile
          )

          if ($isPrerelease) {
            $releaseArgs += "--prerelease"
          }

          gh release create @releaseArgs
