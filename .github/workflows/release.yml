name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Generate changelog from git log
        id: changelog
        shell: pwsh
        run: |
          $previousTag = git describe --tags --abbrev=0 HEAD~1 2>$null
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrEmpty($previousTag)) {
            $log = git log --pretty=format:"- %s (%h)" HEAD
          } else {
            $log = git log --pretty=format:"- %s (%h)" "$previousTag..HEAD"
          }
          $changelog = $log -join "`n"
          if ([string]::IsNullOrEmpty($changelog)) {
            $changelog = "- Release ${{ steps.version.outputs.TAG }}"
          }
          # Write to file to avoid multiline env var issues
          $changelog | Out-File -FilePath changelog.txt -Encoding utf8
          echo "Generated changelog with $($log.Count) entries"

      - name: Restore
        run: dotnet restore

      - name: Build and Test
        run: |
          dotnet build --configuration Release --no-restore
          dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish self-contained Windows x64
        run: >
          dotnet publish src/GBM.Desktop/GBM.Desktop.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish/win-x64
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:PublishSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Download previous release for delta generation
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.VELOPACK_GITHUB_TOKEN }}
          --outputDir releases/
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId GloriousBatteryMonitor
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish/win-x64
          --mainExe GBM.Desktop.exe
          --packTitle "Glorious Battery Monitor"
          --outputDir releases/
          --icon src/GBM.Desktop/Assets/app-icon.ico

      - name: Create GitHub Release and upload assets
        shell: pwsh
        run: |
          $changelog = Get-Content changelog.txt -Raw
          $tag = "${{ steps.version.outputs.TAG }}"
          $version = "${{ steps.version.outputs.VERSION }}"

          # Create the release
          $releaseBody = @{
            tag_name = $tag
            name = "Glorious Battery Monitor $tag"
            body = $changelog
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          $headers = @{
            Authorization = "Bearer ${{ secrets.VELOPACK_GITHUB_TOKEN }}"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/${{ github.repository }}/releases" `
            -Method POST `
            -Headers $headers `
            -Body $releaseBody `
            -ContentType "application/json"

          $uploadUrl = $release.upload_url -replace '\{.*\}', ''
          echo "Release created: $($release.html_url)"
          echo "Upload URL: $uploadUrl"

          # Upload all files from releases/ directory
          Get-ChildItem releases/ | ForEach-Object {
            $file = $_.FullName
            $fileName = $_.Name
            $mimeType = "application/octet-stream"
            echo "Uploading $fileName..."
            Invoke-RestMethod `
              -Uri "${uploadUrl}?name=$fileName" `
              -Method POST `
              -Headers $headers `
              -InFile $file `
              -ContentType $mimeType | Out-Null
            echo "Uploaded $fileName"
          }

          echo "All assets uploaded successfully"
