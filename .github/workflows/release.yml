name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Build and Test
        run: |
          dotnet build --configuration Release --no-restore
          dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish self-contained Windows x64
        run: >
          dotnet publish src/GBM.Desktop/GBM.Desktop.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output publish/win-x64
          -p:Version=${{ steps.version.outputs.VERSION }}
          -p:PublishSingleFile=true
          -p:DebugType=None
          -p:DebugSymbols=false

      - name: Download previous release for delta generation
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.VELOPACK_GITHUB_TOKEN }}
          --outputDir releases/
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId GloriousBatteryMonitor
          --packVersion ${{ steps.version.outputs.VERSION }}
          --packDir publish/win-x64
          --mainExe GBM.Desktop.exe
          --packTitle "Glorious Battery Monitor"
          --releaseDir releases/
          --icon src/GBM.Desktop/Assets/app-icon.ico

      - name: Generate changelog from commits
        id: changelog
        uses: metcalfc/changelog-generator@v4.3.1
        with:
          myToken: ${{ secrets.VELOPACK_GITHUB_TOKEN }}

      - name: Upload to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.VELOPACK_GITHUB_TOKEN }}
          --tag ${{ steps.version.outputs.TAG }}
          --releaseDir releases/
          --releaseName "Glorious Battery Monitor ${{ steps.version.outputs.TAG }}"
